name: Monthly API Monitor

on:
  schedule:
    # Runs at 9am CT on the 1st and 15th of each month
    - cron: '0 14 1,15 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: write

jobs:
  check-apis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API monitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python monitor.py

      - name: Commit updated baselines
        run: |
          git config user.name "API Monitor Bot"
          git config user.email "api-monitor@kamberlaw.com"
          git add baselines/
          git diff --staged --quiet || git commit -m "Update API baselines — $(date -u +%Y-%m-%d)"
          git push
